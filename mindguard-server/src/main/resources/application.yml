server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mindguard?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: ${DB_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB
  sql:
    init:
      mode: never

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.mindguard.module.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:MindGuardJwtSecretKey2026ForSmartCampusPsyProject}
  expiration: 86400000

deepseek:
  api:
    key: ${DEEPSEEK_API_KEY:sk-4b1a7f2c9d8e3a5b7f1c2d4e6a8b0c3d}
    url: https://api.deepseek.com/v1/chat/completions
  mock: true

mindguard:
  upload:
    path: ./uploads
  ai:
    crisis-threshold: 40
